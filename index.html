<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>စန္ဒြာ — ယနေ့အတွက်ဟောစာတမ်း</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Myanmar:wght@400;600;700&family=Cinzel:wght@400;600&family=Noto+Sans+Myanmar:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0a17;
    --deep:#140f2b;
    --mid:#221a45;
    --gold:#d9b26a;
    --gold-soft:#f0d9a8;
    --violet:#9b7fd9;
    --rose:#e6a4b8;
    --mint:#8fd0b8;
    --ink:#f3ead9;
    --ink-muted:#b6acd1;
    --line: rgba(217,178,106,0.25);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  *{-webkit-tap-highlight-color:transparent;}

  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
  }

  body{
    background: radial-gradient(ellipse at 50% -10%, #251c48 0%, var(--deep) 45%, var(--void) 100%);
    color:var(--ink);
    font-family:'Noto Sans Myanmar', sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    min-height:100svh;
    position:relative;
    text-size-adjust:100%;
    -webkit-text-size-adjust:100%;
  }

  /* ---------- Starfield ---------- */
  #starfield{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .star{
    position:absolute;
    width:2px;height:2px;
    background:var(--gold-soft);
    border-radius:50%;
    opacity:0.3;
  }
  @media (prefers-reduced-motion: no-preference){
    .star{ animation: twinkle linear infinite; }
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15; transform:scale(1);}
    50%{opacity:0.95; transform:scale(1.6);}
  }

  .drift-particle{
    position:absolute;
    width:3px;height:3px;
    background:var(--gold);
    border-radius:50%;
    opacity:0.5;
    filter: blur(0.3px);
  }
  @media (prefers-reduced-motion: no-preference){
    .drift-particle{ animation: drift 14s ease-in-out infinite; }
  }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:0.6;}
    50%{ transform:translateY(-140px) translateX(20px); }
    90%{opacity:0;}
    100%{ transform:translateY(-280px) translateX(-10px); opacity:0;}
  }

  /* ---------- Layout ---------- */
  header, main, footer{ position:relative; z-index:2; }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 6vw;
  }
  .logo{
    font-family:'Noto Serif Myanmar', serif;
    font-size:1.7rem;
    color:var(--gold-soft);
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo svg{ width:26px; height:26px; }
  .tagline-mini{
    font-family:'Cinzel', serif;
    font-size:0.62rem;
    letter-spacing:3px;
    color:var(--ink-muted);
    text-transform:uppercase;
  }

  /* ---------- Hero ---------- */
  .hero{
    min-height:100vh;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:max(40px, env(safe-area-inset-top)) 6vw max(60px, env(safe-area-inset-bottom));
    position:relative;
  }

  .eyebrow{
    font-family:'Cinzel', serif;
    font-size:clamp(0.6rem, 1.6vw, 0.7rem);
    letter-spacing:5px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:22px;
    opacity:0.9;
  }

  .hero h1{
    font-family:'Noto Serif Myanmar', serif;
    font-weight:700;
    font-size:clamp(2.6rem, 9vw, 6.2rem);
    line-height:1.15;
    /* NOTE: do not use background-clip:text + transparent color here. That gradient-text
       trick forces some Chromium builds onto a rendering path that breaks complex-script
       shaping for Myanmar (stacked vowel signs render as detached loops until the text is
       selected, which repaints via the normal shaped path). A solid color + glow keeps the
       gold look while guaranteeing correct glyph shaping. */
    color:var(--gold-soft);
    text-shadow: 0 0 46px rgba(217,178,106,0.55), 0 0 90px rgba(217,178,106,0.25);
    margin-bottom:18px;
  }

  .hero p.sub{
    max-width:min(480px, 86vw);
    color:var(--ink-muted);
    font-size:clamp(0.92rem, 2.4vw, 1.02rem);
    line-height:1.8;
    margin-bottom:clamp(28px, 6vw, 44px);
  }

  /* ---------- ကံစမ်းတံ (fortune stick) tube, soft-shaded 3D style, rocks as one rigid piece ---------- */
  .siamsi-scene{
    position:relative;
    width:clamp(150px, 36vw, 210px);
    margin:0 auto clamp(20px, 5vw, 32px);
  }

  .siamsi-btn{
    all:unset;
    display:block;
    position:relative;
    width:100%;
    cursor:pointer;
    touch-action:manipulation;
    border-radius:20px;
  }
  .siamsi-btn svg{
    display:block;
    width:100%;
    height:auto;
    overflow:visible;
    filter:drop-shadow(0 18px 22px rgba(0,0,0,0.45));
  }
  .siamsi-btn:focus-visible{
    outline:2px solid var(--gold-soft);
    outline-offset:8px;
  }

  /* The whole cup+sticks rock together as one rigid piece, like tilting a cup to shake it */
  .siamsi-svg .rig{
    transform-box:fill-box;
    transform-origin:50% 92%;
  }
  @media (prefers-reduced-motion: no-preference){
    .siamsi-svg .rig{ animation: idleSway 4.5s ease-in-out infinite; }
    .siamsi-scene.shaking .rig{ animation: rock 0.68s cubic-bezier(.36,.07,.19,.97) 1; }
  }
  @keyframes idleSway{
    0%,100%{ transform:rotate(-1.6deg) translateY(0); }
    50%{ transform:rotate(1.6deg) translateY(-2px); }
  }
  /* A rattling, decelerating shake — like a hand actually jerking the cup side to side */
  @keyframes rock{
    0%{   transform:rotate(0deg)    translate(0,0); }
    6%{   transform:rotate(-11deg)  translate(-4px,-2px); }
    14%{  transform:rotate(9deg)    translate(4px,-3px); }
    22%{  transform:rotate(-12deg)  translate(-5px,-1px); }
    30%{  transform:rotate(10deg)   translate(4px,-3px); }
    39%{  transform:rotate(-9deg)   translate(-3px,-1px); }
    48%{  transform:rotate(8deg)    translate(3px,-2px); }
    58%{  transform:rotate(-6deg)   translate(-2px,-1px); }
    68%{  transform:rotate(5deg)    translate(2px,-1px); }
    79%{  transform:rotate(-3deg)   translate(-1px,0); }
    90%{  transform:rotate(1.5deg)  translate(0,0); }
    100%{ transform:rotate(0deg)    translate(0,0); }
  }

  /* Individual sticks jitter slightly out of phase with each other while shaking, so the
     bundle rattles instead of moving as one dead-flat slab */
  .siamsi-svg .stick-jitter{
    transform-box:fill-box;
    transform-origin:50% 100%;
  }
  @media (prefers-reduced-motion: no-preference){
    .siamsi-scene.shaking .stick-jitter{
      animation:jitter var(--jd, 0.24s) ease-in-out var(--jdelay, 0s) 3;
    }
  }
  @keyframes jitter{
    0%,100%{ transform:rotate(0deg) translateY(0); }
    50%{ transform:rotate(var(--jr, 3deg)) translateY(-2px); }
  }

  .siamsi-svg .stick{
    transform-box:fill-box;
    transform-origin:50% 100%;
  }
  .stick-shaft{ fill:url(#shaftGrad); }
  .stick-shine{ fill:rgba(255,244,220,0.35); }
  .stick-band{ fill:url(#bandGrad); }
  .stick-tip{ fill:url(#tipGrad); }
  .stick-num{
    fill:#f4dfa8;
    font-family:'Noto Sans Myanmar', sans-serif;
    font-weight:700;
    font-size:7px;
    text-anchor:middle;
  }
  .glow-dot{
    fill:#fff2c2;
    opacity:0;
    filter:drop-shadow(0 0 7px rgba(247,207,92,0.95));
    transition:opacity .3s ease;
  }

  .tube-body{ fill:url(#cupGrad); }
  .tube-rim{ fill:url(#rimGrad); }
  .tube-rim-inner{ fill:#2c0810; opacity:0.9; }
  .tube-highlight{ fill:rgba(255,255,255,0.16); }
  .tube-highlight-soft{ fill:rgba(255,255,255,0.07); }
  .tube-rivet{ fill:#e9c07a; opacity:0.55; }

  .palm{ fill:url(#skinGrad); }
  .finger{ fill:url(#skinGrad); stroke:rgba(58,28,12,0.25); stroke-width:0.6; }
  .palm-crease{ fill:none; stroke:rgba(90,50,25,0.3); stroke-width:1; stroke-linecap:round; }
  .thumb{ fill:url(#thumbGrad); stroke:rgba(58,28,12,0.2); stroke-width:0.6; }
  .thumb-crease{ fill:none; stroke:rgba(90,50,25,0.3); stroke-width:1; stroke-linecap:round; }
  .thumb-nail{ fill:#eeccb4; opacity:0.75; }
  .finger-crease{ fill:none; stroke:rgba(90,50,25,0.32); stroke-width:0.8; stroke-linecap:round; }
  .finger-nail{ fill:#eeccb4; opacity:0.6; }
  .knuckle-shade{ fill:rgba(90,50,25,0.14); }

  /* Winning stick actually rises up out of the bundle, tips over the rim, and comes to
     rest leaning out — like a real เซียมซี stick that has fallen clear of the others */
  .siamsi-scene.popped .stick.winner{
    animation:fallOut .85s cubic-bezier(.22,.75,.25,1) forwards;
  }
  .siamsi-scene.popped .stick.winner .glow-dot{ opacity:1; }
  .siamsi-scene.popped .stick.winner .stick-tip{
    filter:drop-shadow(0 0 10px rgba(225,75,63,0.85));
  }
  .siamsi-scene.popped .stick:not(.winner){
    transition:opacity .4s ease, transform .4s ease;
    opacity:0.75;
    transform:translateY(2%);
  }
  @keyframes fallOut{
    0%{   transform:rotate(1deg)   translateY(0)    scale(1); }
    32%{  transform:rotate(-8deg)  translateY(-74%) scale(1.05); }
    55%{  transform:rotate(22deg)  translateY(-90%) scale(1.05); }
    75%{  transform:rotate(58deg)  translateY(-82%) scale(1.02); }
    88%{  transform:rotate(74deg)  translateY(-72%) scale(1); }
    100%{ transform:rotate(70deg)  translateY(-75%) scale(1); }
  }

  /* Little puff of motion dust where the winning stick settles */
  .land-mote{
    fill:var(--gold-soft);
    opacity:0;
  }
  .siamsi-scene.popped .land-mote{
    animation:moteBurst .7s ease-out forwards;
    animation-delay:.62s;
  }
  @keyframes moteBurst{
    0%{ opacity:0; transform:scale(0.3) translateY(0); }
    35%{ opacity:0.9; }
    100%{ opacity:0; transform:scale(1.4) translateY(-10px); }
  }

  .siamsi-shadow{
    position:relative;
    left:50%; margin-top:-2%;
    transform:translateX(-50%);
    width:70%; height:16px;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0.45), transparent 70%);
    filter:blur(2px);
  }
  @media (prefers-reduced-motion: no-preference){
    .siamsi-scene.shaking .siamsi-shadow{ animation:shadowPulse 0.68s ease-in-out 1; }
  }
  @keyframes shadowPulse{
    0%,100%{ transform:translateX(-50%) scaleX(1); opacity:1; }
    50%{ transform:translateX(-50%) scaleX(0.82); opacity:0.7; }
  }

  .hint{
    margin-top:6px;
    font-size:0.8rem;
    color:var(--ink-muted);
    opacity:0.7;
  }

  footer{
    text-align:center;
    padding:40px 6vw 60px;
    color:var(--ink-muted);
    font-size:0.78rem;
    line-height:2;
    opacity:0.65;
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(6,4,16,0.72);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
    overflow:hidden;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .overlay::before{
    content:'';
    position:absolute;
    top:50%; left:50%;
    width:120vmax; height:120vmax;
    background:radial-gradient(circle, rgba(217,178,106,0.35) 0%, rgba(155,127,217,0.18) 30%, transparent 65%);
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
    pointer-events:none;
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open::before{ animation: burstFlash 1.1s cubic-bezier(.15,.7,.3,1) forwards; }
  }

  @keyframes burstFlash{
    0%{ transform:translate(-50%,-50%) scale(0); opacity:0.9; }
    60%{ opacity:0.55; }
    100%{ transform:translate(-50%,-50%) scale(1); opacity:0; }
  }

  .card-halo{
    position:relative;
    width:min(480px, 100%);
    max-height:88vh;
    border-radius:26px;
    padding:2px;
    background:conic-gradient(from 0deg, var(--gold) 0%, var(--rose) 25%, var(--violet) 50%, var(--gold-soft) 75%, var(--gold) 100%);
    transform:scale(0.6) rotateY(-35deg) translateY(40px);
    opacity:0;
    box-shadow:0 30px 90px rgba(0,0,0,0.55);
    transition:transform .55s cubic-bezier(.2,.85,.25,1.35), opacity .4s ease;
  }
  .overlay.open .card-halo{
    transform:scale(1) rotateY(0deg) translateY(0);
    opacity:1;
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open .card-halo{ animation: spinHalo 8s linear infinite; }
  }
  @keyframes spinHalo{
    from{ background:conic-gradient(from 0deg, var(--gold) 0%, var(--rose) 25%, var(--violet) 50%, var(--gold-soft) 75%, var(--gold) 100%); }
    to{ background:conic-gradient(from 360deg, var(--gold) 0%, var(--rose) 25%, var(--violet) 50%, var(--gold-soft) 75%, var(--gold) 100%); }
  }

  .card{
    position:relative;
    max-height:calc(88vh - 4px);
    overflow-y:auto;
    background:linear-gradient(165deg, #1d1640 0%, #120c28 100%);
    border-radius:24px;
    padding:40px 30px 32px;
    text-align:center;
    box-shadow:inset 0 0 60px rgba(155,127,217,0.15);
  }

  .card::before, .card::after{
    content:'';
    position:absolute;
    width:26px;height:26px;
    border:1px solid var(--gold);
    opacity:0.6;
  }
  .card::before{ top:12px; left:12px; border-right:none; border-bottom:none; }
  .card::after{ bottom:12px; right:12px; border-left:none; border-top:none; }
  @media (prefers-reduced-motion: no-preference){
    .card::before, .card::after{ animation: cornerPulse 2.6s ease-in-out infinite; }
  }
  @keyframes cornerPulse{
    0%,100%{ opacity:0.4; }
    50%{ opacity:1; }
  }

  .close-btn{
    position:absolute; top:16px; right:18px;
    background:none; border:none; color:var(--ink-muted);
    font-size:1.3rem; cursor:pointer; line-height:1;
    padding:4px 8px;
    transition:color .2s ease;
    z-index:2;
  }
  .close-btn:hover{ color:var(--gold-soft); }

  .card .card-title{
    font-family:'Noto Serif Myanmar', serif;
    font-size:1.7rem;
    color:var(--gold-soft);
    margin-bottom:6px;
    text-shadow:0 0 24px rgba(217,178,106,0.5);
  }
  .card .card-sub{
    font-size:0.82rem;
    color:var(--ink-muted);
    margin-bottom:22px;
  }

  .stick-number-badge{
    width:74px; height:74px;
    margin:4px auto 14px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif Myanmar', serif;
    font-weight:700;
    font-size:1.7rem;
    color:var(--gold-soft);
    background:radial-gradient(circle at 35% 30%, rgba(217,178,106,0.28), rgba(217,178,106,0.06) 70%);
    border:1px solid var(--line);
    box-shadow:0 0 30px rgba(217,178,106,0.25);
    opacity:0;
    transform:translateY(10px);
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open .stick-number-badge{ animation: itemReveal .55s cubic-bezier(.2,.8,.3,1) forwards; animation-delay:.1s; }
  }
  @keyframes itemReveal{
    to{ opacity:1; transform:translateY(0); }
  }
  .fortune-text{
    text-align:left;
    font-size:0.96rem;
    line-height:1.95;
    color:var(--ink);
    white-space:pre-line;
    padding:18px;
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(255,255,255,0.02);
    margin-bottom:24px;
    opacity:0;
    transform:translateY(14px);
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open .fortune-text{ animation: itemReveal .55s cubic-bezier(.2,.8,.3,1) forwards; animation-delay:.18s; }
  }

  /* Sparkle burst particles spawned on open */
  .sparkle{
    position:fixed;
    top:50%; left:50%;
    width:6px; height:6px;
    background:var(--gold-soft);
    border-radius:50%;
    pointer-events:none;
    z-index:51;
    box-shadow:0 0 8px 2px rgba(240,217,168,0.8);
  }
  @media (prefers-reduced-motion: no-preference){
    .sparkle{ animation: sparkleOut .9s ease-out forwards; }
  }
  @keyframes sparkleOut{
    0%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
    100%{ transform:translate(var(--sx), var(--sy)) scale(0); opacity:0; }
  }


  .rating{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 18px;
    border-radius:999px;
    border:1px solid var(--line);
    font-size:0.85rem;
    margin-bottom:26px;
    color:var(--ink-muted);
  }
  .rating .stars{ color:var(--gold); letter-spacing:2px; }

  .card-actions{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .btn-secondary{
    font-family:'Noto Sans Myanmar', sans-serif;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-muted);
    padding:12px 22px;
    border-radius:999px;
    cursor:pointer;
    font-size:0.9rem;
    transition:all .2s ease;
  }
  .btn-secondary:hover{ border-color:var(--gold); color:var(--gold-soft); }

  .btn-primary{
    font-family:'Noto Sans Myanmar', sans-serif;
    font-weight:600;
    background:linear-gradient(135deg, var(--gold-soft), var(--gold));
    border:none;
    color:var(--void);
    padding:12px 26px;
    border-radius:999px;
    cursor:pointer;
    font-size:0.9rem;
    transition:transform .2s ease;
  }
  .btn-primary:hover{ transform:translateY(-2px); }

  @media (max-width:520px){
    .card{ padding:36px 22px 30px; }
    header{ padding:22px 5vw; }
  }

  @media (max-width:360px){
    .siamsi-scene{ width:clamp(120px, 40vw, 150px); }
    .hero p.sub{ font-size:0.88rem; }
    .card{ padding:30px 16px 26px; }
    .card-title{ font-size:1.4rem; }
  }

  /* Short / landscape viewports (e.g. phone rotated) — trim vertical rhythm so content fits */
  @media (max-height:560px) and (orientation:landscape){
    .hero{ min-height:auto; padding:24px 6vw 32px; }
    .eyebrow{ margin-bottom:12px; }
    .hero h1{ font-size:clamp(2.2rem, 7vw, 3.4rem); margin-bottom:10px; }
    .hero p.sub{ margin-bottom:16px; }
    .siamsi-scene{ width:clamp(110px, 20vw, 150px); margin-bottom:14px; }
    .card{ max-height:82vh; padding:26px 22px 22px; }
  }

  /* Header/footer respect device notches and home-indicator areas */
  header{
    padding-left:max(6vw, env(safe-area-inset-left));
    padding-right:max(6vw, env(safe-area-inset-right));
  }
  footer{
    padding-left:max(6vw, env(safe-area-inset-left));
    padding-right:max(6vw, env(safe-area-inset-right));
    padding-bottom:max(60px, env(safe-area-inset-bottom));
  }

  /* Large desktop / wide screens — keep content from feeling lost in empty space */
  @media (min-width:1440px){
    .hero p.sub{ font-size:1.08rem; }
    .siamsi-scene{ width:220px; }
  }

  /* Coarse pointer (touch) devices — comfortably large tap targets */
  @media (pointer:coarse){
    .close-btn{ font-size:1.5rem; padding:10px 12px; }
    .btn-secondary, .btn-primary{ padding:14px 24px; }
  }
</style>
</head>
<body>

<div id="starfield"></div>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 12.5A8.5 8.5 0 1 1 11.5 4a6.5 6.5 0 0 0 8.5 8.5Z" fill="currentColor" opacity="0.9"/></svg>
    စန္ဒြာ
  </div>
  <div class="tagline-mini">Daily&nbsp;Fortune</div>
</header>

<main>
  <section class="hero">
    <div class="eyebrow">ယနေ့အတွက်ဟောစာတမ်း</div>

    <h1>ဆင်ပိတန်ငွေကြေးကံဗေဒင်</h1>

<script>
  // ---------- Starfield generation ----------
  const starfield = document.getElementById('starfield');
  const STAR_COUNT = 90;
  for(let i=0;i<STAR_COUNT;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDuration = (2 + Math.random()*4) + 's';
    s.style.animationDelay = (Math.random()*5) + 's';
    starfield.appendChild(s);
  }
  const PARTICLE_COUNT = 14;
  for(let i=0;i<PARTICLE_COUNT;i++){
    const p = document.createElement('div');
    p.className = 'drift-particle';
    p.style.left = (35 + Math.random()*30) + 'vw';
    p.style.top = (20 + Math.random()*40) + 'vh';
    p.style.animationDelay = (Math.random()*14) + 's';
    p.style.animationDuration = (10 + Math.random()*8) + 's';
    starfield.appendChild(p);

nt": "အောင်မြင်မှုဆိုတာတနေ့တရက်ထဲရလာတဲ့အရာမျိုးမဟုတ်ပါဘူး။နေ့စဥ်တည်ဆောက်ရတာမျိုးပါ။ ကိုယ့်ရဲ့မဆုတ်မနစ်ကြိုးစားမှုတွေကြောင့်ကံကောင်းလာတော့မယ့်ကာလပါ။\n\nသတိပေးချက် - နေ့စဥ်အသုံးစရိတ်စာရင်းဇယားကိုသေချာလုပ်ထားပြီး လကုန်တဲ့အခါမလိုအပ်တဲ့ငွေထွက်ပေါက်တွေကို သေချာပြန်လည်စစ်ဆေးပြီးပြုပြင်နိုင်ပါတယ်။"}, {"tier": "Stability & Strategy (Neutral / Fair Fortune)", "number": 14, "content": "ကိုယ့်ရဲ့ငွေအဝင်အထွက်စာရင်းတွေကိုသေသေချာချာကြည့်ရှုသုံးစွဲနေဖို့လိုအပ်တဲ့ကာလပါ။\n\nသတိပေးချက် - အတိုးပေါ်အတိုးဆင့်မဖြစ်စေဖို့ အတိုးများတဲ့ချေးငွေတွေကိုမြန်မြန်ကျေအောင်ဆပ်ပြီး တခြားချေးငွေတွေကိုလဲမပျက်မကွက်ပြန်ဆပ်နိုင်ဖို့ ပြက္ခဒိန်၊ မှတ်စုစာအုပ်တို့မှာသေချာရေးမှတ်ပြီး စနစ်တကျပြင်ဆင်ထားသင့်ပါတယ်။"}, {"tier": "Caution & Mindful Action (Small Fortune / Advice)", "number": 15, "content": "ငွေကုန်ကြေးကျများနေတတ်တဲ့ကာလပါ။ဝင်ငွေထွက်ငွေကိုချိန်ပြီးသုံးစွဲသင့်ပါတယ်။\n\nသတိပေးချက် - အရေးပေါ်ငွေလိုတိုင်းအတိုးကြီးကြီးနဲ့ငွေတိုးချေးနေတဲ့သူတွေဆီကချေးငွေတွေခဏခဏယူပြီးဖြေရှင်းတာထက် ဆင်ပိတန်လိုတရားဝင်ကုမ္ပဏီမှာအတိုးနှုန်းနဲနဲနဲ့ချေးငွေယူပြီးဖြေရှင်းတာဟာပိုထိရောက်တဲ့နည်းလမ်းပါ။"}, {"tier": "Steady Growth (Good Fortune)", "number": 16, "content": "သင့်ရဲ့ကတိတည်ပြီး မဆုတ်မနစ်ကြိုးစားတတ်တဲ့အကျင့်ကြောင့် ငွေကြေးကံကောင်းမယ့်အခွင့်အလမ်းသစ်တွေပိုတိုးလာဖို့ရှိပါတယ်။\n\nသတိပေးချက် - ကိုယ့်ရဲ့အရေးကြီးတဲ့ဘဏ်အကောင့်၊ ဆိုရှယ်မီဒီယာတွေကိုအသုံးပြုတဲ့အခါမှာ လှို့ဝှက်နံပါတ်ကိုခန့်မှန်းရလွယ်ကူတဲ့ မှတ်ပုံတင်နံပါတ်၊ ပတ်စပို့နံပါတ်၊ ပန်းရောင်ကတ်၊မွေးနေ့ စသည်တို့ကိုအသုံးပြုခြင်းမှရှောင်ကြဥ်ပြီး လူလိမ်များရန်မှကာကွယ်ပါ။"}, {"tier": "Caution & Mindful Action (Small Fortune / Advice)", "number": 17, "content": "ငွေကြေးကံတည်ငြိမ်နေတာကြောင့် စိတ်အေးအေးထားပြီးကြိုးစားရင်ပိုကောင်းတဲ့ငွေကြေးကံတွေရောက်လာနိုင်တဲ့ကာလပါ။\n\nသတိပေးချက် - သင့်ရဲ့ ဘဏ်ကတ်နံပါတ်၊ ဆိုရှယ်မီဒီယာ နဲ့ ငွေကြေးနဲ့ဆိုင်တဲ့အက်ပလီကေးရှင်းတွေရဲ့  လျှို့ဝှက်နံပါတ်တွေကို ပွဲစား၊ အလုပ်ရှင်၊ မိဘ၊ သူငယ်ချင်း ဘယ်သူကိုမှ မပေးပါနဲ့။"}, {"tier": "Golden Prosperity (Great Fortune)", "number": 18, "content": "ကိုယ့်ရဲ့စနစ်တကျကြိုးစားမှုကြောင့်ရလာတဲ့အသီးအပွင့်တွေကိုစတင်ခံစားရတော့မယ့်ကာလပါ။ \n\nသတိပေးချက် - လစဥ်ပိုက်ဆံကိုစီမံခန့်ခွဲတဲ့အခါ အိမ်အသုံးစရိတ်၊ ကျန်းမာရေးစရိတ်၊ မိသားစုထောက်ပံ့ငွေ၊ စုငွေ စသဖြင့် စနစ်တကျခွဲခြားပြီးသုံးစွဲပါ။"}, {"tier": "Stability & Strategy (Neutral / Fair Fortune)", "number": 19, "content": "ကြုံတွေ့နေတဲ့ငွေကြေးအခက်အခဲတွေမကြာခင်ပြေလည်နိုင်တဲ့ကာလပါ။\n\nသတိပေးချက် - အတိုးကြီးကြီးနဲ့ငွေတိုးချေးနေတဲ့သူတွေကိုသတိထားပါ။ မတန်တဆပေးရတဲ့အတိုးတွေကြောင့်အတိုးပေါ်အတိုးဆင့်ပြီးပိုဒုက္ခရောက်နိုင်ပါတယ်။ အတိုးနှုန်းသက်သာစွာနဲ့ချေးငွေယူဖို့ဆင်ပိတန်ကိုအမြဲသတိရလိုက်ပါ။"}, {"tier": "Caution & Mindful Action (Small Fortune / Advice)", "number": 20, "content": "အကျိုးမရှိတဲ့နေရာတွေမှာမဖြုန်းပဲ သေချာတဲ့တရားဝင်ဘဏ်တွေမှာငွေစုရင်း ငွေကြေးကံပိုကောင်းအောင်မြှင့်တင်လိုက်ပါ။\n\nသတိပေးချက် - အွန်လိုင်းမှာတွေ့ရတဲ့ \"ငွေအမြန်တိုးပွားနည်း၊ဂိမ်းဆော့ပြီး ငွေရှာနည်း\" ဆိုတာတွေကို မယုံပါနဲ့။ ဒါတွေဟာမက်လုံးပေးပြီးကိုယ့်အိတ်ထဲကပိုက်ဆံတွေကိုနှိုက်ယူနေတဲ့အရာတွေပါ။"}, {"tier": "Steady Growth (Good Fortune)", "number": 21, "content": "သင့်ရဲ့ကြံ့ကြံ့ခံကြိုးစားပြီးလျှောက်လှမ်းခဲ့တဲ့နေ့ရက်တွေကြောင့် ကံကောင်းခြင်းနေ့ရက်တွေနဲ့ကြုံဖို့မဝေးတော့ပါဘူး။ \n\nသတိပေးချက် - ပိုမိုခိုင်မာတဲ့ပိုက်ဆံစုနည်းကိုတည်ဆောက်ဖို့ လစဥ်ကိုယ့်ရဲ့ဝင်ငွေရဲ့ ၅၀% ကိုအသုံးစရိတ်၊ ၃၀ % ကိုလိုချင်တာသုံးဖို့နဲ့ ၂၀ % ကိုနောင်ရေးအတွက်စုဆောင်းထားတာမျိုးဆိုပြီး စနစ်တကျသုံးစွဲသင့်ပါတယ်။"}, {"tier": "Stability & Strategy (Neutral / Fair Fortune)", "number": 22, "content": "နည်းလမ်းအသစ်တွေအသုံးပြုပြီးကိုယ့်ရဲ့ငွေကြေးကံကိုမြှင့်တင်ဖို့အချိန်ရောက်နေတဲ့ကာလပါ။\n\nသတိပေးချက် - အခန့်မသင့်လို့ အရေးပေါ်သုံးစရာပေါ်လာတာမျိုး၊ OT မဆင်းရတော့တာတွေကြောင့် ငွေပိုသုံးလိုက်ရပြီး ချေးငွေဆပ်ဖို့အခက်အခဲဖြစ်လာတဲ့အခါ ဆင်ပိတန်ကိုဆက်သွယ်ပြီးတိုင်ပင်ဖြေရှင်းတာမျိုးလုပ်နိုင်ပါတယ်။"}, {"tier": "Caution & Mindful Action (Small Fortune / Advice)", "number": 23, "content": "အတိတ်ကဆုံးဖြတ်ချက်အမှားတွေကနေသင်ခန်းစာယူပြီး တဖြည်းဖြည်းသေချာကြိုးစားရင်း ကိုယ့်ရဲ့ငွေကြေးကံကိုမြှင့်တင်နိုင်တဲ့အချိန်ပါ။\n\nသတိပေးချက် - အရင်က ပွဲစားလိမ်တာ ခံရဖူးရင်ဖြစ်ဖြစ်၊ အပြင်အတိုးကြီးတဲ့ဆီမှာ ငွေချေးမိခဲ့ရင်ဖြစ်ဖြစ် အားမငယ်ပါနဲ့။ ဆင်ပိတန်လိုတရားဝင်ပြီးချေးငွေကုမ္ပဏီမှာချေးငွေမှတ်တမ်းကောင်းကိုတည်ဆောက်ရင်း မှန်ကန်တဲ့လမ်းကြောင်းပေါ်ကိုပြန်တက်လိုက်ပါ။"}, {"tier": "Caution & Mindful Action (Small Fortune / Advice)", "number": 24, "content": "ကိုယ့်ရဲ့ကတိတည်မှု စာရိတ္တကောင်းမွန်မှုတို့ကြောင့် ကူညီပေးမယ့်သူတွေအထောက်အပံ့ကောင်းတွေရလာမယ့်အချိန်ပါ။\n\nသတိပေးချက် - အလုပ်အကိုင် အပြောင်းအလဲကြောင့်ဖြစ်စေ၊ ကျန်းမာရေးကြောင့်ဖြစ်စေ အကြွေးဆပ်ဖို့ အခက်အခဲရှိလာရင်ထွက်မပြေးပဲ ဆင်ပိတန်မှာလာရောက်တိုင်ပင်ပြီး အကူအညီတောင်းပါ။  အကြွေးဟောင်းကိုဆပ်ဖို့ အတိုးကြီးတဲ့ချေးငွေတွေကိုထပ်ယူတာဟာပိုပြီးငွေကြေးကြပ်တည်းလာနိုင်ပါတယ်။"}, {"tier": "Steady Growth (Good Fortune)", "number": 25, "content": "ဒီလရဲ့ငွေကြေးကံကတော့ ဘယ်အရာကိုမဆိုဟန်ချက်ညီညီသုံးစွဲတတ်တဲ့သင့်အတွက် ကံကောင်းခြင်းတွေယူဆောင်လာမယ့်လပါ။\n\nသတိပေးချက် - တလတခါ မိသားစုအချင်းချင်းစုပေါင်းတိုင်ပင်ပြီး အသုံးအစွဲစာရင်းတွေကိုသေချာပြန်လည်ကြည့်ရှုစစ်ဆေးပြီး ငွေကိုစီမံခန့်ခွဲသင့်ပါတယ်။"}, {"tier": "Caution & Mindful Action (Small Fortune / Advice)", "number": 26, "content": "ကိုယ်ပင်ပန်းထားသမျှ ကြိုးစားထားသမျှအရာထင်တော့မယ့်အချိန်ဖြစ်လို့ စိတ်ရှည်ရှည်နဲ့ဆက်ကြိုးစားထားရမယ့်အချိန်ပါ။\n\nသတိပေးချက် - ဆိုရှယ်မီဒီယာပေါ်မှာကိုယ့်ရဲ့ ပတ်စပို့၊ ပန်းရောင်ကတ်၊ CI စာအုပ်၊ ငွေလွှဲပြေစာ ဓာတ်ပုံတွေကို ဘယ်တော့မှ မတင်ပါနဲ့။ မသမာသူတွေက သင့်အချက်အလက်ကို အသုံးပြုပြီး လိမ်လည်နိုင်ပါတယ်။"}, {"tier": "Stability & Strategy (Neutral / Fair Fortune)", "number": 27, "content": "ငွေကြေးအခက်အခဲတွေကိုဖြေရှင်းဖို့အကူအညီကောင်းတွေရလာတတ်ပါတယ်။\n\nသတိပေးချက် - ရုတ်တရက်အလုပ်ပြုတ်သွားတာ၊ အရေးပေါ်ငွေသုံးလိုက်ရတာတွေကြောင့်ချေးငွေပြန်ဆပ်ဖို့အခက်အခဲတွေရှိလာတော့မယ်ဆို ဆင်ပိတန်ဝန်ထမ်းတွေနဲ့တိုင်ပင်လို့ရပါတယ်။"}, {"tier": "Golden Prosperity (Great Fortune)", "number": 28, "content": "ငွေကြေးကံကောင်းနေတာကြောင့် ဘက်ပေါင်းစုံကနေငွေကြေးတွေဝင်လာဖို့ရှိပါတယ်။\n\nသတိပေးချက် - အွန်လိုင်းမှမက်လုံးပေးဆက်သွယ်လာတဲ့သူတွေက လူလိမ်တွေဖြစ်ဖို့များတာကြောင့်\nအယုံမလွယ်မိဖို့အရေးကြီးပါတယ်။"}];

  const TIER_META = {
    'Golden Prosperity (Great Fortune)': { label:'ရွှေချမ်းသာကံ · ကံအကြီးဆုံး', color:'#d9b26a', stars:5 },
    'Steady Growth (Good Fortune)': { label:'တည်ငြိမ်စွာ တိုးတက်ကံ · ကံကောင်း', color:'#8fd0b8', stars:4 },
    'Stability & Strategy (Neutral / Fair Fortune)': { label:'တည်ငြိမ်မှုနှင့် နည်းဗျူဟာ · ကံသာမန်', color:'#9b7fd9', stars:3 },

  };

  let recentIdx = [];
  // Picks a fortune while avoiding recently-shown ones in this session
  function pickFortuneIndex(){
    const maxHistory = Math.min(10, FORTUNES.length - 1);
    let idx, attempts = 0;
    do{
      idx = Math.floor(Math.random()*FORTUNES.length);
      attempts++;
    } while(recentIdx.includes(idx) && attempts < 20);
    recentIdx.push(idx);
    if(recentIdx.length > maxHistory) recentIdx.shift();
    return idx;
  }

  function drawFortune(){
    const idx = pickFortuneIndex();
    const f = FORTUNES[idx];
    const meta = TIER_META[f.tier];
    const numStr = String(f.number).padStart(2,'0');

    document.getElementById('stickNumberBadge').textContent = numStr;
    document.getElementById('cardSub').textContent = 'ကံစမ်းတံ အမှတ် ' + numStr;

    document.getElementById('fortuneText').textContent = f.content;

    const starsStr = '★'.repeat(meta.stars) + '☆'.repeat(5 - meta.stars);
    document.getElementById('ratingBox').innerHTML =
      '<span class="stars" style="color:' + meta.color + '">' + starsStr + '</span>';

    const winnerNumEl = document.querySelector('.stick.winner .stick-num');
    if(winnerNumEl) winnerNumEl.textContent = numStr;
  }


  // ---------- Sparkle burst ----------
  function spawnSparkles(){
    const count = 22;
    for(let i=0;i<count;i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = Math.random()*Math.PI*2;
      const dist = 90 + Math.random()*220;
      const sx = Math.cos(angle)*dist + 'px';
      const sy = Math.sin(angle)*dist + 'px';
      s.style.setProperty('--sx', sx);
      s.style.setProperty('--sy', sy);
      s.style.animationDelay = (Math.random()*0.15) + 's';
      document.body.appendChild(s);
      setTimeout(()=> s.remove(), 1200);
    }
  }

  // ---------- Modal control ----------
  const overlay = document.getElementById('overlay');
  const openBtn = document.getElementById('openBtn');
  const closeBtn = document.getElementById('closeBtn');
  const closeBtn2 = document.getElementById('closeBtn2');
  const rerollBtn = document.getElementById('rerollBtn');
  const siamsiScene = document.getElementById('siamsiScene');
  const allSticks = Array.from(document.querySelectorAll('.siamsi-svg .stick'));
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let isShaking = false;

  // Picks a different physical stick to be "the one that falls out" each time,
  // so it doesn't always look like the same stick wins.
  function chooseWinnerStick(){
    allSticks.forEach(s => s.classList.remove('winner'));
    const pick = allSticks[Math.floor(Math.random() * allSticks.length)];
    pick.classList.add('winner');
  }

  function openModal(){
    drawFortune();
    overlay.classList.add('open');
    spawnSparkles();
  }
  function closeModal(){
    overlay.classList.remove('open');
    siamsiScene.classList.remove('shaking','popped');
  }

  function shakeThenOpen(){
    if(isShaking) return;
    isShaking = true;
    chooseWinnerStick();
    if(reduceMotion){
      openModal();
      isShaking = false;
      return;
    }
    siamsiScene.classList.add('shaking');
    setTimeout(()=>{
      siamsiScene.classList.remove('shaking');
      siamsiScene.classList.add('popped');
      setTimeout(()=>{
        openModal();
        isShaking = false;
      }, 700);
    }, 680);
  }

  openBtn.addEventListener('click', shakeThenOpen);
  closeBtn.addEventListener('click', closeModal);
  closeBtn2.addEventListener('click', closeModal);
  rerollBtn.addEventListener('click', ()=>{ drawFortune(); spawnSparkles(); });
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeModal(); });
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeModal(); });
</script>

</body>
</html>
