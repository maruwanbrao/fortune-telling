<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>စန္ဒြာ — ယနေ့အတွက်ဟောစာတမ်း</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Myanmar:wght@400;600;700&family=Cinzel:wght@400;600&family=Noto+Sans+Myanmar:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0a17;
    --deep:#140f2b;
    --mid:#221a45;
    --gold:#d9b26a;
    --gold-soft:#f0d9a8;
    --violet:#9b7fd9;
    --rose:#e6a4b8;
    --mint:#8fd0b8;
    --ink:#f3ead9;
    --ink-muted:#b6acd1;
    --line: rgba(217,178,106,0.25);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  *{-webkit-tap-highlight-color:transparent;}

  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
  }

  body{
    background: radial-gradient(ellipse at 50% -10%, #251c48 0%, var(--deep) 45%, var(--void) 100%);
    color:var(--ink);
    font-family:'Noto Sans Myanmar', sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    min-height:100svh;
    position:relative;
    text-size-adjust:100%;
    -webkit-text-size-adjust:100%;
  }

  /* ---------- Starfield ---------- */
  #starfield{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .star{
    position:absolute;
    width:2px;height:2px;
    background:var(--gold-soft);
    border-radius:50%;
    opacity:0.3;
  }
  @media (prefers-reduced-motion: no-preference){
    .star{ animation: twinkle linear infinite; }
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15; transform:scale(1);}
    50%{opacity:0.95; transform:scale(1.6);}
  }

  .drift-particle{
    position:absolute;
    width:3px;height:3px;
    background:var(--gold);
    border-radius:50%;
    opacity:0.5;
    filter: blur(0.3px);
  }
  @media (prefers-reduced-motion: no-preference){
    .drift-particle{ animation: drift 14s ease-in-out infinite; }
  }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:0.6;}
    50%{ transform:translateY(-140px) translateX(20px); }
    90%{opacity:0;}
    100%{ transform:translateY(-280px) translateX(-10px); opacity:0;}
  }

  /* ---------- Layout ---------- */
  header, main, footer{ position:relative; z-index:2; }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 6vw;
  }
  .logo{
    font-family:'Noto Serif Myanmar', serif;
    font-size:1.7rem;
    color:var(--gold-soft);
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo svg{ width:26px; height:26px; }
  .tagline-mini{
    font-family:'Cinzel', serif;
    font-size:0.62rem;
    letter-spacing:3px;
    color:var(--ink-muted);
    text-transform:uppercase;
  }

  /* ---------- Hero ---------- */
  .hero{
    min-height:100vh;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:max(40px, env(safe-area-inset-top)) 6vw max(60px, env(safe-area-inset-bottom));
    position:relative;
  }

  .eyebrow{
    font-family:'Cinzel', serif;
    font-size:clamp(0.6rem, 1.6vw, 0.7rem);
    letter-spacing:5px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:22px;
    opacity:0.9;
  }

  .hero h1{
    font-family:'Noto Serif Myanmar', serif;
    font-weight:700;
    font-size:clamp(2.6rem, 9vw, 6.2rem);
    line-height:1.15;
    background:linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 55%, var(--rose) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow: 0 0 60px rgba(217,178,106,0.25);
    margin-bottom:18px;
  }

  .hero p.sub{
    max-width:min(480px, 86vw);
    color:var(--ink-muted);
    font-size:clamp(0.92rem, 2.4vw, 1.02rem);
    line-height:1.8;
    margin-bottom:clamp(28px, 6vw, 44px);
  }

  /* ---------- ကံစမ်းတံ (fortune stick) tube, soft-shaded 3D style, rocks as one rigid piece ---------- */
  .siamsi-scene{
    position:relative;
    width:clamp(150px, 36vw, 210px);
    margin:0 auto clamp(20px, 5vw, 32px);
  }

  .siamsi-btn{
    all:unset;
    display:block;
    position:relative;
    width:100%;
    cursor:pointer;
    touch-action:manipulation;
    border-radius:20px;
  }
  .siamsi-btn svg{
    display:block;
    width:100%;
    height:auto;
    overflow:visible;
    filter:drop-shadow(0 18px 22px rgba(0,0,0,0.45));
  }
  .siamsi-btn:focus-visible{
    outline:2px solid var(--gold-soft);
    outline-offset:8px;
  }

  /* The whole cup+sticks rock together as one rigid piece, like tilting a cup to shake it */
  .siamsi-svg .rig{
    transform-box:fill-box;
    transform-origin:50% 96%;
  }
  @media (prefers-reduced-motion: no-preference){
    .siamsi-svg .rig{ animation: idleSway 4.5s ease-in-out infinite; }
    .siamsi-scene.shaking .rig{ animation: rock 0.5s ease-in-out infinite; }
  }
  @keyframes idleSway{
    0%,100%{ transform:rotate(-1.6deg); }
    50%{ transform:rotate(1.6deg); }
  }
  @keyframes rock{
    0%,100%{ transform:rotate(-10deg); }
    50%{ transform:rotate(10deg); }
  }

  .siamsi-svg .stick{
    transform-box:fill-box;
    transform-origin:50% 100%;
  }
  .stick-shaft{ fill:url(#shaftGrad); }
  .stick-tip{ fill:url(#tipGrad); }
  .stick-num{
    fill:#fbe6c8;
    font-family:'Noto Sans Myanmar', sans-serif;
    font-weight:700;
    font-size:8px;
    text-anchor:middle;
  }
  .glow-dot{
    fill:#fff2c2;
    opacity:0;
    filter:drop-shadow(0 0 7px rgba(247,207,92,0.95));
    transition:opacity .3s ease;
  }

  .tube-body{ fill:url(#cupGrad); }
  .tube-rim{ fill:#4d0f1a; opacity:0.85; }
  .tube-highlight{ fill:rgba(255,255,255,0.14); }

  .siamsi-scene.popped .stick.winner{
    animation:popOut .6s cubic-bezier(.2,.8,.25,1.15) forwards;
  }
  .siamsi-scene.popped .stick.winner .glow-dot{ opacity:1; }
  .siamsi-scene.popped .stick.winner .stick-tip{
    filter:drop-shadow(0 0 10px rgba(225,75,63,0.85));
  }
  .siamsi-scene.popped .stick:not(.winner){
    transition:opacity .35s ease;
    opacity:0.8;
  }
  @keyframes popOut{
    0%{ transform:rotate(1deg) translateY(0) scale(1); }
    55%{ transform:rotate(0deg) translateY(-58%) scale(1.06); }
    100%{ transform:rotate(0deg) translateY(-46%) scale(1.04); }
  }

  .siamsi-shadow{
    position:relative;
    left:50%; margin-top:-4%;
    transform:translateX(-50%);
    width:64%; height:14px;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0.4), transparent 70%);
    filter:blur(2px);
  }

  .hint{
    margin-top:6px;
    font-size:0.8rem;
    color:var(--ink-muted);
    opacity:0.7;
  }

  footer{
    text-align:center;
    padding:40px 6vw 60px;
    color:var(--ink-muted);
    font-size:0.78rem;
    line-height:2;
    opacity:0.65;
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(6,4,16,0.72);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
    overflow:hidden;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .overlay::before{
    content:'';
    position:absolute;
    top:50%; left:50%;
    width:120vmax; height:120vmax;
    background:radial-gradient(circle, rgba(217,178,106,0.35) 0%, rgba(155,127,217,0.18) 30%, transparent 65%);
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
    pointer-events:none;
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open::before{ animation: burstFlash 1.1s cubic-bezier(.15,.7,.3,1) forwards; }
  }

  @keyframes burstFlash{
    0%{ transform:translate(-50%,-50%) scale(0); opacity:0.9; }
    60%{ opacity:0.55; }
    100%{ transform:translate(-50%,-50%) scale(1); opacity:0; }
  }

  .card-halo{
    position:relative;
    width:min(480px, 100%);
    max-height:88vh;
    border-radius:26px;
    padding:2px;
    background:conic-gradient(from 0deg, var(--gold) 0%, var(--rose) 25%, var(--violet) 50%, var(--gold-soft) 75%, var(--gold) 100%);
    transform:scale(0.6) rotateY(-35deg) translateY(40px);
    opacity:0;
    box-shadow:0 30px 90px rgba(0,0,0,0.55);
    transition:transform .55s cubic-bezier(.2,.85,.25,1.35), opacity .4s ease;
  }
  .overlay.open .card-halo{
    transform:scale(1) rotateY(0deg) translateY(0);
    opacity:1;
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open .card-halo{ animation: spinHalo 8s linear infinite; }
  }
  @keyframes spinHalo{
    from{ background:conic-gradient(from 0deg, var(--gold) 0%, var(--rose) 25%, var(--violet) 50%, var(--gold-soft) 75%, var(--gold) 100%); }
    to{ background:conic-gradient(from 360deg, var(--gold) 0%, var(--rose) 25%, var(--violet) 50%, var(--gold-soft) 75%, var(--gold) 100%); }
  }

  .card{
    position:relative;
    max-height:calc(88vh - 4px);
    overflow-y:auto;
    background:linear-gradient(165deg, #1d1640 0%, #120c28 100%);
    border-radius:24px;
    padding:40px 30px 32px;
    text-align:center;
    box-shadow:inset 0 0 60px rgba(155,127,217,0.15);
  }

  .card::before, .card::after{
    content:'';
    position:absolute;
    width:26px;height:26px;
    border:1px solid var(--gold);
    opacity:0.6;
  }
  .card::before{ top:12px; left:12px; border-right:none; border-bottom:none; }
  .card::after{ bottom:12px; right:12px; border-left:none; border-top:none; }
  @media (prefers-reduced-motion: no-preference){
    .card::before, .card::after{ animation: cornerPulse 2.6s ease-in-out infinite; }
  }
  @keyframes cornerPulse{
    0%,100%{ opacity:0.4; }
    50%{ opacity:1; }
  }

  .close-btn{
    position:absolute; top:16px; right:18px;
    background:none; border:none; color:var(--ink-muted);
    font-size:1.3rem; cursor:pointer; line-height:1;
    padding:4px 8px;
    transition:color .2s ease;
    z-index:2;
  }
  .close-btn:hover{ color:var(--gold-soft); }

  .card .card-title{
    font-family:'Noto Serif Myanmar', serif;
    font-size:1.7rem;
    color:var(--gold-soft);
    margin-bottom:6px;
    text-shadow:0 0 24px rgba(217,178,106,0.5);
  }
  .card .card-sub{
    font-size:0.82rem;
    color:var(--ink-muted);
    margin-bottom:22px;
  }

  .stick-number-badge{
    width:74px; height:74px;
    margin:4px auto 14px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif Myanmar', serif;
    font-weight:700;
    font-size:1.7rem;
    color:var(--gold-soft);
    background:radial-gradient(circle at 35% 30%, rgba(217,178,106,0.28), rgba(217,178,106,0.06) 70%);
    border:1px solid var(--line);
    box-shadow:0 0 30px rgba(217,178,106,0.25);
    opacity:0;
    transform:translateY(10px);
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open .stick-number-badge{ animation: itemReveal .55s cubic-bezier(.2,.8,.3,1) forwards; animation-delay:.1s; }
  }
  @keyframes itemReveal{
    to{ opacity:1; transform:translateY(0); }
  }
  .fortune-text{
    text-align:left;
    font-size:0.96rem;
    line-height:1.95;
    color:var(--ink);
    white-space:pre-line;
    padding:18px;
    border:1px solid var(--line);
    border-radius:16px;
    background:rgba(255,255,255,0.02);
    margin-bottom:24px;
    opacity:0;
    transform:translateY(14px);
  }
  @media (prefers-reduced-motion: no-preference){
    .overlay.open .fortune-text{ animation: itemReveal .55s cubic-bezier(.2,.8,.3,1) forwards; animation-delay:.18s; }
  }

  /* Sparkle burst particles spawned on open */
  .sparkle{
    position:fixed;
    top:50%; left:50%;
    width:6px; height:6px;
    background:var(--gold-soft);
    border-radius:50%;
    pointer-events:none;
    z-index:51;
    box-shadow:0 0 8px 2px rgba(240,217,168,0.8);
  }
  @media (prefers-reduced-motion: no-preference){
    .sparkle{ animation: sparkleOut .9s ease-out forwards; }
  }
  @keyframes sparkleOut{
    0%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
    100%{ transform:translate(var(--sx), var(--sy)) scale(0); opacity:0; }
  }


  .rating{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 18px;
    border-radius:999px;
    border:1px solid var(--line);
    font-size:0.85rem;
    margin-bottom:26px;
    color:var(--ink-muted);
  }
  .rating .stars{ color:var(--gold); letter-spacing:2px; }

  .card-actions{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .btn-secondary{
    font-family:'Noto Sans Myanmar', sans-serif;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-muted);
    padding:12px 22px;
    border-radius:999px;
    cursor:pointer;
    font-size:0.9rem;
    transition:all .2s ease;
  }
  .btn-secondary:hover{ border-color:var(--gold); color:var(--gold-soft); }

  .btn-primary{
    font-family:'Noto Sans Myanmar', sans-serif;
    font-weight:600;
    background:linear-gradient(135deg, var(--gold-soft), var(--gold));
    border:none;
    color:var(--void);
    padding:12px 26px;
    border-radius:999px;
    cursor:pointer;
    font-size:0.9rem;
    transition:transform .2s ease;
  }
  .btn-primary:hover{ transform:translateY(-2px); }

  @media (max-width:520px){
    .card{ padding:36px 22px 30px; }
    header{ padding:22px 5vw; }
  }

  @media (max-width:360px){
    .siamsi-scene{ width:clamp(120px, 40vw, 150px); }
    .hero p.sub{ font-size:0.88rem; }
    .card{ padding:30px 16px 26px; }
    .card-title{ font-size:1.4rem; }
  }

  /* Short / landscape viewports (e.g. phone rotated) — trim vertical rhythm so content fits */
  @media (max-height:560px) and (orientation:landscape){
    .hero{ min-height:auto; padding:24px 6vw 32px; }
    .eyebrow{ margin-bottom:12px; }
    .hero h1{ font-size:clamp(2.2rem, 7vw, 3.4rem); margin-bottom:10px; }
    .hero p.sub{ margin-bottom:16px; }
    .siamsi-scene{ width:clamp(110px, 20vw, 150px); margin-bottom:14px; }
    .card{ max-height:82vh; padding:26px 22px 22px; }
  }

  /* Header/footer respect device notches and home-indicator areas */
  header{
    padding-left:max(6vw, env(safe-area-inset-left));
    padding-right:max(6vw, env(safe-area-inset-right));
  }
  footer{
    padding-left:max(6vw, env(safe-area-inset-left));
    padding-right:max(6vw, env(safe-area-inset-right));
    padding-bottom:max(60px, env(safe-area-inset-bottom));
  }

  /* Large desktop / wide screens — keep content from feeling lost in empty space */
  @media (min-width:1440px){
    .hero p.sub{ font-size:1.08rem; }
    .siamsi-scene{ width:220px; }
  }

  /* Coarse pointer (touch) devices — comfortably large tap targets */
  @media (pointer:coarse){
    .close-btn{ font-size:1.5rem; padding:10px 12px; }
    .btn-secondary, .btn-primary{ padding:14px 24px; }
  }
</style>
</head>
<body>

<div id="starfield"></div>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 12.5A8.5 8.5 0 1 1 11.5 4a6.5 6.5 0 0 0 8.5 8.5Z" fill="currentColor" opacity="0.9"/></svg>
    စန္ဒြာ
  </div>
  <div class="tagline-mini">Daily&nbsp;Fortune</div>
</header>

<main>
  <section class="hero">
    <div class="eyebrow">နယနေ့အတွက်ဟောစာတမ်း</div>

    <h1>ဆင်ပိတန်ငွေကြေးကံဗေဒင်</h1>
    <p class="sub">စိတ်ကိုတည်ငြိမ်စွာထားပြီး ဟောစာတမ်းဘူးကိုလက်နဲ့တို့ထိလိုက်ပါ။

    <div class="siamsi-scene" id="siamsiScene">
      <button class="siamsi-btn" id="openBtn" aria-label="ကံစမ်းတံများကို လှုပ်ရှားပြီး ကံဟောချက်ကို ဖွင့်ပါ">
        <svg class="siamsi-svg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="cupGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#b23347"/>
              <stop offset="30%" stop-color="#8f1f33"/>
              <stop offset="65%" stop-color="#6c1526"/>
              <stop offset="100%" stop-color="#4a0f1a"/>
            </linearGradient>
            <linearGradient id="shaftGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#e8ad3c"/>
              <stop offset="45%" stop-color="#f3c765"/>
              <stop offset="100%" stop-color="#b9791d"/>
            </linearGradient>
            <linearGradient id="tipGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e75a4a"/>
              <stop offset="100%" stop-color="#9c1f1f"/>
            </linearGradient>
          </defs>

          <g class="rig">
            <g class="sticks">
              <g transform="rotate(-28 100 150)">
                <g class="stick" style="animation-delay:.03s">
                  <rect class="stick-shaft" x="95" y="110" width="10" height="58" rx="4"/>
                  <text class="stick-num" x="100" y="122">7</text>
                  <path class="stick-tip" d="M100,94 L106,110 L100,115 L94,110 Z"/>
                </g>
              </g>
              <g transform="rotate(-19 100 150)">
                <g class="stick" style="animation-delay:.07s">
                  <rect class="stick-shaft" x="95" y="98" width="10" height="70" rx="4"/>
                  <text class="stick-num" x="100" y="110">15</text>
                  <path class="stick-tip" d="M100,82 L106,98 L100,103 L94,98 Z"/>
                </g>
              </g>
              <g transform="rotate(-9 100 150)">
                <g class="stick" style="animation-delay:.01s">
                  <rect class="stick-shaft" x="95" y="112" width="10" height="56" rx="4"/>
                  <text class="stick-num" x="100" y="124">3</text>
                  <path class="stick-tip" d="M100,96 L106,112 L100,117 L94,112 Z"/>
                </g>
              </g>
              <g transform="rotate(0 100 150)">
                <g class="stick winner" style="animation-delay:.05s">
                  <rect class="stick-shaft" x="95" y="93" width="10" height="75" rx="4"/>
                  <text class="stick-num" id="winnerStickNum" x="100" y="105">21</text>
                  <path class="stick-tip" d="M100,77 L106,93 L100,98 L94,93 Z"/>
                  <circle class="glow-dot" cx="100" cy="71" r="5"/>
                </g>
              </g>
              <g transform="rotate(9 100 150)">
                <g class="stick" style="animation-delay:.08s">
                  <rect class="stick-shaft" x="95" y="108" width="10" height="60" rx="4"/>
                  <text class="stick-num" x="100" y="120">9</text>
                  <path class="stick-tip" d="M100,92 L106,108 L100,113 L94,108 Z"/>
                </g>
              </g>
              <g transform="rotate(19 100 150)">
                <g class="stick" style="animation-delay:.02s">
                  <rect class="stick-shaft" x="95" y="102" width="10" height="66" rx="4"/>
                  <text class="stick-num" x="100" y="114">18</text>
                  <path class="stick-tip" d="M100,86 L106,102 L100,107 L94,102 Z"/>
                </g>
              </g>
              <g transform="rotate(28 100 150)">
                <g class="stick" style="animation-delay:.06s">
                  <rect class="stick-shaft" x="95" y="114" width="10" height="54" rx="4"/>
                  <text class="stick-num" x="100" y="126">5</text>
                  <path class="stick-tip" d="M100,98 L106,114 L100,119 L94,114 Z"/>
                </g>
              </g>
            </g>
            <g class="tube">
              <ellipse class="tube-rim" cx="100" cy="150" rx="56" ry="10"/>
              <rect class="tube-body" x="44" y="150" width="112" height="98" rx="18"/>

  const TIER_META = {
    'Golden Prosperity (Great Fortune)': { label:'ရွှေချမ်းသာကံ · ကံအကြီးဆုံး', color:'#d9b26a', stars:5 },
    'Steady Growth (Good Fortune)': { label:'တည်ငြိမ်စွာ တိုးတက်ကံ · ကံကောင်း', color:'#8fd0b8', stars:4 },
    'Stability & Strategy (Neutral / Fair Fortune)': { label:'တည်ငြိမ်မှုနှင့် နည်းဗျူဟာ · ကံသာမန်', color:'#9b7fd9', stars:3 },
    'Caution & Mindful Action (Small Fortune / Advice)': { label:'သတိထားရန် · ကံသေး', color:'#e6a4b8', stars:2 }
  };

  let recentIdx = [];
  // Picks a fortune while avoiding recently-shown ones in this session
  function pickFortuneIndex(){
    const maxHistory = Math.min(10, FORTUNES.length - 1);
    let idx, attempts = 0;
    do{
      idx = Math.floor(Math.random()*FORTUNES.length);
      attempts++;
    } while(recentIdx.includes(idx) && attempts < 20);
    recentIdx.push(idx);
    if(recentIdx.length > maxHistory) recentIdx.shift();
    return idx;
  }

  function drawFortune(){
    const idx = pickFortuneIndex();
    const f = FORTUNES[idx];
    const numStr = String(f.number).padStart(2,'0');

    document.getElementById('stickNumberBadge').textContent = numStr;
    document.getElementById('cardSub').textContent = 'ကံစမ်းတံ အမှတ် ' + numStr;

    document.getElementById('fortuneText').textContent = f.content;

    document.getElementById('ratingBox').innerHTML = '';

    const winnerNumEl = document.getElementById('winnerStickNum');
    if(winnerNumEl) winnerNumEl.textContent = numStr;
  }


  // ---------- Sparkle burst ----------
  function spawnSparkles(){
    const count = 22;
    for(let i=0;i<count;i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = Math.random()*Math.PI*2;
      const dist = 90 + Math.random()*220;
      const sx = Math.cos(angle)*dist + 'px';
      const sy = Math.sin(angle)*dist + 'px';
      s.style.setProperty('--sx', sx);
      s.style.setProperty('--sy', sy);
      s.style.animationDelay = (Math.random()*0.15) + 's';
      document.body.appendChild(s);
      setTimeout(()=> s.remove(), 1200);
    }
  }

  // ---------- Modal control ----------
  const overlay = document.getElementById('overlay');
  const openBtn = document.getElementById('openBtn');
  const closeBtn = document.getElementById('closeBtn');
  const closeBtn2 = document.getElementById('closeBtn2');
  const rerollBtn = document.getElementById('rerollBtn');
  const siamsiScene = document.getElementById('siamsiScene');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let isShaking = false;

  function openModal(){
    drawFortune();
    overlay.classList.add('open');
    spawnSparkles();
  }
  function closeModal(){
    overlay.classList.remove('open');
    siamsiScene.classList.remove('shaking','popped');
  }

  function shakeThenOpen(){
    if(isShaking) return;
    isShaking = true;
    if(reduceMotion){
      openModal();
      isShaking = false;
      return;
    }
    siamsiScene.classList.add('shaking');
    setTimeout(()=>{
      siamsiScene.classList.remove('shaking');
      siamsiScene.classList.add('popped');
      setTimeout(()=>{
        openModal();
        isShaking = false;
      }, 550);
    }, 650);
  }

  openBtn.addEventListener('click', shakeThenOpen);
  closeBtn.addEventListener('click', closeModal);
  closeBtn2.addEventListener('click', closeModal);
  rerollBtn.addEventListener('click', ()=>{ drawFortune(); spawnSparkles(); });
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeModal(); });
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeModal(); });
</script>
